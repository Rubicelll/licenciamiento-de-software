        <!-- Modal -->
        <div class="modal fade" id="modalLicense" tabindex="-1" role="dialog" aria-hidden="true">
          <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title">Datos de la licencia</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                  <span aria-hidden="true">&times;</span>
                </button>
              </div>
              <form id="license-form-update">
                <div class="modal-body">
                  <div class="container-fluid">
                    <div class="form row">
                      <input type="text" id="u-idLicense" hidden>
                      <div class="col-12 col-sm-6 col-xl-4">
                        <div class="form-group">
                          <label for="name">Nombre de la lincencia</label>
                          <input type="text" class="form-control" id="u-LicenseName" aria-describedby="nombre de la licencia">
                        </div>
                      </div>
                      <div class="col-12 col-sm-6 col-xl-4">
                        <div class="form-group">
                          <label for="quantity">Cantidad de lincencias</label>
                          <input type="number" class="form-control" id="u-LicenseQuantity" aria-describedby="Cantidad de lincencias">
                        </div>
                      </div>
                      <div class="col-12 col-sm-6 col-xl-4">
                        <div class="form-group">
                          <label for="startingValidity">Vigencia de inicio</label>
                          <input type="date" class="form-control" id="u-LicenseStartingValidity" aria-describedby="Vigencia de inicio">
                        </div>
                      </div>
                      <div class="col-12 col-sm-6 col-xl-4">
                        <div class="form-group">
                          <label for="termValidity">Vigencia de termino</label>
                          <input type="date" class="form-control" id="u-LicenseTermValidity" aria-describedby="Vigencia de termino">
                        </div>
                      </div>
                      <div class="col-12 col-sm-6 col-xl-4">
                        <div class="form-group">
                          <label for="contractNumber">No. contrato</label>
                          <input type="text" class="form-control" id="u-LicenseContractNumber" aria-describedby="Número de contrato">
                        </div>
                      </div>
                      <div class="col-12 col-sm-6 col-xl-4">
                        <div class="form-group">
                          <label for="acquisitionPrice">Precio de adquisición</label>
                          <input type="number" class="form-control" id="u-LicenseAcquisitionPrice" aria-describedby="Precio de adquisición" step="0.01">
                        </div>
                      </div>
                      <div class="col-12 col-sm-6 col-xl-4">
                        <div class="form-group">
                          <label for="maker">Fabricante</label>
                          <input type="text" class="form-control" id="u-LicenseMaker" aria-describedby="Fabricante">
                        </div>
                      </div>
                      <div class="col-12 col-sm-6 col-xl-4">
                        <div class="form-group">
                          <label for="provider">Proveedor</label>
                          <input type="text" class="form-control" id="u-LicenseProvider" aria-describedby="Proveedor">
                        </div>
                      </div>
                      <div class="col-12 col-sm-6 col-xl-4">
                        <div class="form-group">
                          <label for="impact">Impacto</label>
                          <input type="text" class="form-control" id="u-LicenseImpact" aria-describedby="Impacto">
                        </div>
                      </div>
                      <div class="col-12 col-sm-6 col-xl-4">
                        <div class="form-group">
                          <label for="comments">Comentarios</label>
                          <input type="text" class="form-control" id="u-LicenseComments" aria-describedby="Comentarios">
                        </div>
                      </div>
                      <div class="col-12 col-sm-6 col-xl-4">
                        <div class="form-group">
                        <label for="acquisitionMode">Modo de adquisición</label>
                          <select class="form-control" id="u-LicenseAcquisitionMode">
                            <!-- .... -->
                          </select>
                        </div>
                      </div>
                      <div class="col-12 col-sm-6 col-xl-4">
                        <div class="form-group">
                        <label for="licenseType">Tipo de licencia</label>
                          <select class="form-control" id="u-LicenseType">
                            <!-- .... -->
                          </select>
                        </div>
                      </div>
                      <div class="col-12 col-lg-6 col-xl-4">
                        <div class="form-group">
                          <label>Disponibilidad</label>
                          <div id="u-LicenseAvailability">
                          <!-- .... -->
                          </div>
                        </div>
                      </div>
                      <div class="col-12 col-sm-6 col-xl-4">
                        <div class="form-group">
                          <label>Productos</label>
                          <div id="u-LicenseProducts">
                          <!-- .... -->
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="modal-footer">
                  <button type="button" class="btn btn-secondary" data-dismiss="modal">Cerrar</button>
                  <button type="button" class="btn btn-success" onclick="updateLicense()">Actualizar</button>
                  <button type="button" class="btn btn-danger" onclick="deleteLicense()">Eliminar</button>
                </div>
              </form>
            </div>
          </div>
